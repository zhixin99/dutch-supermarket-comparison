services:
  - type: web
    name: supermarket-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.render.app:app --host 0.0.0.0 --port 10000
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
